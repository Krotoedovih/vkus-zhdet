<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ВкусЖдёт • Вкусная еда дома и с доставкой</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      font-family:'Poppins',sans-serif; 
      background:#0f0f0f; 
      color:#e0d9d0; 
      line-height:1.6; 
      overflow-x: hidden;
    }

    /* Анимация fade-in при скролле */
    .fade-in {
      opacity: 0;
      transform: translateY(60px);
      transition: opacity 1s ease-out, transform 1s ease-out;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    header {
      height:100vh; min-height:700px;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
                  url('https://images.unsplash.com/photo-1606857521015-7f9fcf423740?ixlib=rb-4.0.3&auto=format&fit=crop&w=2340&q=80') center/cover no-repeat fixed;
      color:white; display:flex; align-items:center; justify-content:center; text-align:center;
      animation: headerZoom 20s infinite alternate ease-in-out;
    }
    @keyframes headerZoom {
      0% { background-size: 110%; }
      100% { background-size: 130%; }
    }

    header h1 { 
      font-family:'Playfair Display',serif; 
      font-size:clamp(4.5rem,10vw,11rem); 
      margin-bottom:1.5rem; 
      text-shadow:0 5px 20px rgba(0,0,0,0.9);
      animation: fadeInText 1.5s ease-out;
    }
    @keyframes fadeInText {
      from { opacity:0; transform: translateY(-30px); }
      to { opacity:1; transform: translateY(0); }
    }

    header p { font-size:1.6rem; max-width:800px; margin:0 auto 3rem; opacity:0.95; animation: fadeInText 2s ease-out 0.5s both; }

    .btn { 
      display:inline-block; padding:16px 42px; background:#e65c3d; color:white; text-decoration:none;
      border-radius:50px; font-weight:600; font-size:1.25rem; transition:all 0.4s ease;
      box-shadow:0 8px 30px rgba(230,92,61,0.4);
    }
    .btn:hover { 
      background:#d14a2c; 
      transform:translateY(-5px) scale(1.05); 
      box-shadow:0 15px 40px rgba(230,92,61,0.7); 
    }

    section { padding:120px 5%; }
    h2 { 
      font-family:'Playfair Display',serif; 
      font-size:3.8rem; 
      text-align:center; 
      margin-bottom:4rem; 
      color:#f5e8d3; 
    }

    .grid { 
      display:grid; 
      grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); 
      gap:3rem; 
      max-width:1400px; 
      margin:0 auto; 
    }

    .card {
      background:#1a1a1a; 
      border-radius:24px; 
      overflow:hidden; 
      box-shadow:0 15px 40px rgba(0,0,0,0.5);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
    }
    .card:hover { 
      transform: translateY(-20px) scale(1.04); 
      box-shadow: 0 30px 70px rgba(230,92,61,0.35);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(230,92,61,0.15), transparent);
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .card:hover::before { opacity: 1; }

    .card img { 
      width:100%; 
      height:300px; 
      object-fit:cover; 
      transition: transform 0.8s ease;
    }
    .card:hover img { transform: scale(1.08); }

    .card-content { padding:2.2rem; text-align:center; }

    .card h3 { font-family:'Playfair Display',serif; font-size:2.2rem; margin-bottom:1rem; color:#f5e8d3; }

    .price { font-size:1.6rem; font-weight:600; color:#e65c3d; margin:1.2rem 0; }

    footer { background:#0a0a0a; color:#b0a090; text-align:center; padding:5rem 1rem; font-size:1.1rem; }

    #contact { background:#1a1a1a; padding:120px 5%; text-align:center; }
    #contact form { max-width:700px; margin:3rem auto; display:grid; gap:1.8rem; }
    #contact input, #contact textarea { 
      padding:16px; 
      border:none; 
      border-radius:12px; 
      font-size:1.1rem; 
      background:#2a2a2a; 
      color:#e0d9d0; 
      transition: all 0.3s;
    }
    #contact input:focus, #contact textarea:focus { 
      outline: none; 
      box-shadow: 0 0 0 3px rgba(230,92,61,0.4); 
      transform: scale(1.02); 
    }

    /* JS для fade-in при скролле (очень лёгкий) */
    @media (prefers-reduced-motion: no-preference) {
      .fade-in { transition: opacity 1.2s ease-out, transform 1.2s ease-out; }
    }

    @media (max-width:768px) { header h1 {font-size:5.5rem;} h2 {font-size:2.8rem;} }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>ВкусЖдёт</h1>
      <p>Готовим с душой • Доставка по Бендерам • Рецепты для дома</p>
      <a href="recipes.html" class="btn">Смотреть рецепты</a>
    </div>
  </header>

  <section id="menu">
    <h2 class="fade-in">Хиты меню — готовим дома</h2>
    <div class="grid">
      <div class="card fade-in">
        <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?ixlib=rb-4.0.3&auto=format&fit=crop&w=781&q=80" alt="Пицца">
        <div class="card-content">
          <h3>Маргарита Премиум</h3>
          <p>Классика на тонком тесте</p>
          <div class="price">480 ₽</div>
          <a href="recipes.html#margherita" class="btn" style="margin-top:1.2rem;">Рецепт →</a>
        </div>
      </div>

      <!-- Повтори для остальных карточек, добавь class="fade-in" -->

      <!-- ... остальные 3 карточки аналогично ... -->
    </div>
  </section>

  <section id="contact" class="fade-in">
    <h2>Напиши нам прямо сейчас</h2>
    <p style="max-width:600px; margin:0 auto 3rem; font-size:1.3rem; opacity:0.9;">Заказ, вопрос, предложение — ответим быстро</p>
    
    <form action="https://formspree.io/f/xxxxxxxx" method="POST">
      <input type="text" name="name" placeholder="Ваше имя" required>
      <input type="tel" name="phone" placeholder="Телефон" required>
      <input type="email" name="_replyto" placeholder="Email (не обязательно)">
      <textarea name="message" placeholder="Что хотите заказать или спросить?" rows="5" required></textarea>
      <button type="submit" class="btn">Отправить →</button>
    </form>
  </section>

  <footer>
    <p>© 2025–2026 ВкусЖдёт • Бендеры</p>
  </footer>

  <!-- Плавающая Telegram-кнопка с пульсацией -->
  <a href="https://t.me/твой_ник" target="_blank" rel="noopener noreferrer"
     style="position:fixed; bottom:30px; right:30px; z-index:9999; display:flex; align-items:center; justify-content:center; width:70px; height:70px; background:#0088cc; color:white; border-radius:50%; box-shadow:0 10px 30px rgba(0,136,204,0.5); transition:all 0.4s ease; animation: pulse 2s infinite ease-in-out;">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.896 16.312c-.164.468-.508.84-.972 1.016-.684.264-1.604.064-2.508-.48l-3.78-2.772c-.372-.272-.62-.708-.668-1.192l-.312-3.172c-.036-.372.108-.74.392-.98l4.908-3.78c.492-.38 1.18-.292 1.56.2.38.492.292 1.18-.2 1.56l-4.3 3.312.236 2.396 3.18 2.332c.492.36 1.172.272 1.56-.22.388-.492.3-1.172-.192-1.56z"/></svg>
  </a>
  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow:0 10px 30px rgba(0,136,204,0.5); }
      50% { transform: scale(1.08); box-shadow:0 15px 45px rgba(0,136,204,0.7); }
    }
    a[href^="https://t.me/"]:hover { transform:scale(1.15) !important; animation: none; }
  </style>

  <!-- Лёгкий JS для fade-in при скролле (можно убрать, если хочешь чистый CSS) -->
  <script>
    const fadeElements = document.querySelectorAll('.fade-in');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    fadeElements.forEach(el => observer.observe(el));
  </script>

</body>
</html>
